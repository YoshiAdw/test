<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Форма заявки для 1C Fitness</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 500px; margin: 50px auto; padding: 20px; }
        input, textarea { width: 100%; padding: 10px; margin: 10px 0; box-sizing: border-box; }
        button { background: #007cba; color: white; padding: 12px; border: none; width: 100%; cursor: pointer; font-size: 16px; }
        button:hover { background: #005a87; }
        #status { margin-top: 20px; padding: 10px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <h1>Заявка в фитнес-клуб</h1>
    <form id="leadForm">
        <input type="text" id="name" placeholder="Имя" required>
        <input type="text" id="last_name" placeholder="Фамилия" required>
        <input type="tel" id="phone" placeholder="Телефон (например, 79876543210)" required>
        <input type="email" id="email" placeholder="Email">
        <textarea id="comment" placeholder="Комментарий" rows="4"></textarea>
        <button type="submit">Отправить заявку</button>
    </form>
    <div id="status"></div>

    <script>
        // Функция для получения UTM и Client ID параметров
        function getTrackingParams() {
            const urlParams = new URLSearchParams(window.location.search);
            return {
                utm_source: urlParams.get('utm_source') || '',
                utm_medium: urlParams.get('utm_medium') || '',
                utm_campaign: urlParams.get('utm_campaign') || '',
                utm_term: urlParams.get('utm_term') || '',
                utm_content: urlParams.get('utm_content') || '',
                ga_cid: getClientId('ga') || '',
                rs_cid: getClientId('rs') || '',
                ym_cid: getClientId('ym') || '',
                rs_vid: getClientId('rs_vid') || '',
                ct_cid: getClientId('ct_cid') || ''
            };
        }

        // Функция для получения Client ID из dataLayer (Google Analytics, Roistat, Yandex Metrika)
        function getClientId(prefix) {
            if (typeof dataLayer !== 'undefined') {
                const item = dataLayer.find(item => item['clientId'] || item['cid']);
                if (item) return item['clientId'] || item['cid'] || '';
            }
            // Альтернатива: из localStorage для GA/YM
            if (prefix === 'ga') return localStorage.getItem('_ga')?.match(/GA1\.2\.(.+)\./)?.[1] || '';
            if (prefix === 'ym') return localStorage.getItem('_ym_uid') || '';
            return '';
        }

        // Обработка формы
        document.getElementById('leadForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const formData = {
                name: document.getElementById('name').value,
                last_name: document.getElementById('last_name').value,
                phone: document.getElementById('phone').value,
                email: document.getElementById('email').value,
                comment: document.getElementById('comment').value || 'Новая заявка с сайта'
            };

            const tracking = getTrackingParams();
            const payload = { ...formData, ...tracking };

            const statusDiv = document.getElementById('status');
            statusDiv.textContent = 'Отправка...';
            statusDiv.className = '';

            try {
                const response = await fetch('https://api.apimonster.ru/webhooks/150674/31061/210/ec7e47da7b38bedb1f7553fb16417528/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json; charset=UTF-8'
                    },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    statusDiv.textContent = 'Заявка успешно отправлена в 1C!';
                    statusDiv.className = 'success';
                    this.reset();
                } else {
                    throw new Error(`Ошибка: ${response.status}`);
                }
            } catch (error) {
                statusDiv.textContent = `Ошибка отправки: ${error.message}`;
                statusDiv.className = 'error';
            }
        });
    </script>
</body>
</html>
